name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test

  # Deploys themselves happen via Vercel's own git integration (both the
  # frontend and backend Vercel projects auto-deploy on push to main).
  # Migrations have no safe "boot hook" on serverless, so they run here
  # instead — once, sequentially, only on pushes to main (never on PR
  # previews, which would otherwise race each other against the same DB).
  # ponytail: not gated on test-backend — that job's lint step currently
  # fails on ~120 pre-existing type-safety findings unrelated to migration
  # safety (Prisma migration files are what actually needs to be correct
  # here). Re-add `needs: test-backend` once lint is clean.
  migrate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
